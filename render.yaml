services:
  - type: web
    name: bagwaan-advisory-bot
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: META_PHONE_NUMBER_ID
        sync: false          # you fill this in Render dashboard
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: TOMORROW_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bagwaan-db
          property: connectionString

databases:
  - name: bagwaan-db
    plan: free
